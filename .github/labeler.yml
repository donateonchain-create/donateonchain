# Auto-labeler configuration
# Labels PRs based on file paths

# Smart Contracts
"smart-contracts":
  - changed-files:
    - any-glob-to-any-file: 
      - 'src/**/*.sol'
      - 'script/**/*.sol'
      - 'test/**/*.sol'
      - 'foundry.toml'

# Frontend
"frontend":
  - changed-files:
    - any-glob-to-any-file: 
      - 'apps/web/**/*'

# Backend API
"backend":
  - changed-files:
    - any-glob-to-any-file: 
      - 'services/api/**/*'

# Relayer
"relayer":
  - changed-files:
    - any-glob-to-any-file: 
      - 'services/relayer/**/*'

# CI/CD
"ci-cd":
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**/*'

# Documentation
"documentation":
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**/*'

# Dependencies
"dependencies":
  - changed-files:
    - any-glob-to-any-file:
      - '**/package.json'
      - '**/package-lock.json'
      - 'foundry.lock'

# Security
"security":
  - changed-files:
    - any-glob-to-any-file:
      - 'SECURITY.md'
      - '.github/workflows/security-scan.yml'

# Tests
"tests":
  - changed-files:
    - any-glob-to-any-file:
      - 'test/**/*'
      - '**/*.test.js'
      - '**/*.test.ts'
      - '**/*.spec.js'
      - '**/*.spec.ts'
