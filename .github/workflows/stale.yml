name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark or Close Stale Items
    runs-on: ubuntu-latest
    
    steps:
      - name: Stale Issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues configuration
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,critical,in-progress'
          stale-issue-message: |
            👋 This issue has been automatically marked as stale because it has not had recent activity. 
            It will be closed in 14 days if no further activity occurs.
            
            If this issue is still relevant, please:
            - Add a comment explaining why it should remain open
            - Remove the 'stale' label
            - Provide any updates or additional context
            
            Thank you for your contributions! 🙏
          close-issue-message: |
            🔒 This issue has been automatically closed due to inactivity.
            
            If you believe this issue should be reopened, please:
            - Comment with additional context or updates
            - Mention a maintainer
            
            Thank you for your understanding! 🙏
          
          # Pull Requests configuration
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,critical,in-progress,do-not-close'
          stale-pr-message: |
            👋 This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 7 days if no further activity occurs.
            
            If this PR is still being worked on, please:
            - Add a comment with status update
            - Remove the 'stale' label
            - Rebase if needed
            
            Thank you for your contribution! 🙏
          close-pr-message: |
            🔒 This pull request has been automatically closed due to inactivity.
            
            If you'd like to continue working on this:
            - Reopen the PR with a comment
            - Ensure it's rebased on the latest main branch
            - Mention a maintainer
            
            Thank you for your understanding! 🙏
          
          # General configuration
          ascending: true
          operations-per-run: 100
