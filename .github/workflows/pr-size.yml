name: PR Size Labeler

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  label-size:
    name: Label PR Size
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Calculate PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Get PR files
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            
            // Calculate total changes
            const totalChanges = files.data.reduce((sum, file) => {
              return sum + file.additions + file.deletions;
            }, 0);
            
            // Determine size label
            let sizeLabel = '';
            if (totalChanges < 20) {
              sizeLabel = 'size/XS';
            } else if (totalChanges < 50) {
              sizeLabel = 'size/S';
            } else if (totalChanges < 200) {
              sizeLabel = 'size/M';
            } else if (totalChanges < 500) {
              sizeLabel = 'size/L';
            } else if (totalChanges < 1000) {
              sizeLabel = 'size/XL';
            } else {
              sizeLabel = 'size/XXL';
            }
            
            // Remove old size labels
            const currentLabels = pr.labels.map(label => label.name);
            const sizeLabels = currentLabels.filter(label => label.startsWith('size/'));
            
            for (const label of sizeLabels) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: label,
              });
            }
            
            // Add new size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [sizeLabel],
            });
            
            console.log(`Labeled PR #${pr.number} as ${sizeLabel} (${totalChanges} changes)`);
