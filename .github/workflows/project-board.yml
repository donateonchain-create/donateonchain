name: Project Board Automation

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  update-board:
    name: Update Project Board
    runs-on: ubuntu-latest
    
    steps:
      - name: Add to Project Board
        if: github.event.action == 'opened' && github.event.pull_request.user.type != 'Bot'
        continue-on-error: true
        id: add-to-project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/users/donateonchain-create/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Move to Done
        if: github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Issue/PR closed, should move to Done column');
            // Project board automation can be configured in GitHub UI
            // This is a placeholder for custom automation

      - name: Label based on milestone
        if: github.event.issue || github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const item = context.payload.issue || context.payload.pull_request;
            
            if (item.milestone) {
              const milestone = item.milestone.title;
              let label = '';
              
              if (milestone.includes('v1.1')) {
                label = 'v1.1';
              } else if (milestone.includes('v1.2')) {
                label = 'v1.2';
              } else if (milestone.includes('v2.0')) {
                label = 'v2.0';
              }
              
              if (label) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: item.number,
                  labels: [label]
                });
              }
            }
      
      - name: Workflow Summary
        run: |
          echo "### Project Board Automation Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Workflow completed successfully" >> $GITHUB_STEP_SUMMARY
