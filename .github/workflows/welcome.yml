name: Issue and PR Notifications

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  notify:
    name: Team Notifications
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify on critical issues
        if: github.event.action == 'labeled' && contains(github.event.label.name, 'critical')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Critical Priority** - This issue has been marked as critical and needs immediate attention from the team.'
            })
      
      - name: Notify on security issues
        if: github.event.action == 'labeled' && contains(github.event.label.name, 'security')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🔒 **Security Issue** - This issue involves security concerns and should be reviewed by the security team.'
            })
