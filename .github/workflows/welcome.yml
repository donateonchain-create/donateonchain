name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Welcome Message
    runs-on: ubuntu-latest
    
    steps:
      - name: Welcome First Time Contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to DonateOnChain! Thank you for opening your first issue.
            
            We appreciate your contribution and will review your issue as soon as possible. 
            
            In the meantime:
            - Please ensure you've filled out all sections of the issue template
            - Check our [Contributing Guidelines](../CONTRIBUTING.md) if you haven't already
            - Join our [Discussions](https://github.com/donateonchain-create/donateonchain/discussions) for questions
            
            A maintainer will be with you shortly. Thanks for helping make charitable giving more transparent! 🙏
          pr-message: |
            👋 Welcome to DonateOnChain! Thank you for opening your first pull request.
            
            We're excited to see your contribution! Here's what happens next:
            
            1. 🤖 Automated checks will run to verify your code
            2. 👀 A maintainer will review your changes
            3. 💬 We may suggest some changes or improvements
            4. ✅ Once approved, we'll merge your PR!
            
            Please make sure:
            - [ ] All tests are passing
            - [ ] You've filled out the PR template completely
            - [ ] Your code follows our [Contributing Guidelines](../CONTRIBUTING.md)
            - [ ] Documentation is updated if needed
            
            Thank you for your contribution! 🎉
