name: Comment Commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  handle-command:
    name: Handle Comment Commands
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Handle /assign command
        if: startsWith(github.event.comment.body, '/assign')
        uses: actions/github-script@v8
        with:
          script: |
            const issue_number = context.issue.number;
            const commenter = context.actor;
            
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              assignees: [commenter]
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `✅ Assigned to @${commenter}`
            });

      - name: Handle /unassign command
        if: startsWith(github.event.comment.body, '/unassign')
        uses: actions/github-script@v8
        with:
          script: |
            const issue_number = context.issue.number;
            const commenter = context.actor;
            
            await github.rest.issues.removeAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              assignees: [commenter]
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `✅ Unassigned @${commenter}`
            });

      - name: Handle /help command
        if: startsWith(github.event.comment.body, '/help')
        uses: actions/github-script@v8
        with:
          script: |
            const issue_number = context.issue.number;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `## 🤖 Available Commands

            Here are the commands you can use in comments:
            
            - \`/assign\` - Assign yourself to this issue
            - \`/unassign\` - Unassign yourself from this issue
            - \`/help\` - Show this help message
            
            **Note:** Some commands may require specific permissions.
            
            For more information, check our [Contributing Guidelines](../CONTRIBUTING.md).`
            });
