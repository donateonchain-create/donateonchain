version: 2

updates:
  # Smart Contract Dependencies (Foundry)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "smart-contracts"
    reviewers:
      - "donateonchain-create/contract-team"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # Keep Hedera SDK stable - only allow minor and patch updates
      - dependency-name: "@hashgraph/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@hashgraph/hedera-wallet-connect"
        update-types: ["version-update:semver-major"]
      # Ignore patch updates for stable dependencies
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-patch"]

  # Frontend Dependencies
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "donateonchain-create/frontend-team"
    commit-message:
      prefix: "chore(deps-frontend)"
      include: "scope"
    groups:
      # Group React ecosystem updates together
      react:
        patterns:
          - "react*"
          - "@types/react*"
      # Group viem and wagmi (Web3 stack) together
      web3:
        patterns:
          - "viem"
          - "wagmi"
          - "@reown/*"
      # Group Hedera-specific packages
      hedera:
        patterns:
          - "@hashgraph/*"
          - "hashconnect"
    ignore:
      # Ignore major version updates for critical packages
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Keep blockchain libraries stable - only security updates
      - dependency-name: "viem"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "wagmi"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "@hashgraph/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@hashgraph/hedera-wallet-connect"
        update-types: ["version-update:semver-major"]
      # Ignore patch updates for stable packages
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-patch"]

  # API Service Dependencies
  - package-ecosystem: "npm"
    directory: "/services/api"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"
    reviewers:
      - "donateonchain-create/backend-team"
    commit-message:
      prefix: "chore(deps-api)"
      include: "scope"
    groups:
      # Group Prisma updates together
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      # Group express ecosystem
      express:
        patterns:
          - "express"
          - "cors"
          - "multer"
    ignore:
      # Keep blockchain libraries stable
      - dependency-name: "viem"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      # Ignore patch updates for stable dependencies
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "express"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "cors"
        update-types: ["version-update:semver-patch"]

  # Relayer Service Dependencies
  - package-ecosystem: "npm"
    directory: "/services/relayer"
    schedule:
      interval: "monthly"
      day: "tuesday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "relayer"
    reviewers:
      - "donateonchain-create/backend-team"
    commit-message:
      prefix: "chore(deps-relayer)"
      include: "scope"
    ignore:
      # Keep viem stable - critical for blockchain interactions
      # Only allow security updates (not minor/patch)
      - dependency-name: "viem"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      # Ignore patch updates for stable dependencies
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "express"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "cors"
        update-types: ["version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci-cd"
    reviewers:
      - "donateonchain-create/devops-team"
    commit-message:
      prefix: "chore(deps-actions)"
      include: "scope"
    groups:
      # Group GitHub Actions updates together
      actions:
        patterns:
          - "*"
